name: "AutoSD: Build and Publish"

on:
  pull_request:
    paths:
      - autosd/**
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [x86_64, aarch64]
        include:
          - platform: x86_64
            runner: ubuntu-latest
          - platform: aarch64
            runner: ubuntu-latest-aarch64
    
    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        working-directory: autosd

    steps:
      - uses: actions/checkout@v4

      - name: Install Base Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y podman

      - name: Install AIB container script
        run: |
          wget -O auto-image-builder.sh \
          https://gitlab.com/CentOS/automotive/src/automotive-image-builder/-/raw/main/auto-image-builder.sh?ref_type=heads

          chmod +x auto-image-builder.sh

      - name: Build QEMU Image (x86_64)
        run: |
          export AIB_LOCAL_CONTAINER_STORAGE=$PWD/_build/containers-storage
          export AIB_BIN=./auto-image-builder.sh

          mkdir -p $AIB_LOCAL_CONTAINER_STORAGE

          sudo -E bash ./scripts/build.sh

      - name: Fix build dir permissions
        run: |
          sudo chown -R $(id -u) _build/

      - name: Upload QEMU Image
        uses: actions/upload-artifact@v4
        with:
          name: score-autosd-${{ matrix.runner }}-latest.qcow2
          path: autosd/_build/disk.qcow2
